<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Funnel+Display:wght@300..800&family=Funnel+Sans:wght@300..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap">
  <title>jfladas</title>
  <script>
    // Restore deep-link URLs redirected by public/404.html on GitHub Pages.
    (function (l) {
      var params = new URLSearchParams(l.search)
      var p = params.get('p')

      if (p) {
        var path = p.replace(/~and~/g, '&')
        var q = params.get('q')
        var query = q ? '?' + q.replace(/~and~/g, '&') : ''

        window.history.replaceState(null, null, path + query + l.hash)
      }
    })(window.location)
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>

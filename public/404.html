<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Redirecting...</title>
        <script>
            // Redirect deep links on GitHub Pages to index with encoded path.
            (function () {
                var l = window.location
                var segmentCount = 0
                var newUrl =
                    l.protocol +
                    '//' +
                    l.hostname +
                    (l.port ? ':' + l.port : '') +
                    l.pathname
                        .split('/')
                        .slice(0, 1 + segmentCount)
                        .join('/') +
                    '/?p=/' +
                    l.pathname
                        .slice(1)
                        .split('/')
                        .slice(segmentCount)
                        .join('/')
                        .replace(/&/g, '~and~') +
                    (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash

                l.replace(newUrl)
            })()
        </script>
    </head>
    <body></body>
</html>

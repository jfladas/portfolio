name: Update Spotify Data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update_spotify]

permissions:
  contents: write

concurrency:
  group: spotify-data-update
  cancel-in-progress: true

jobs:
  update-spotify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Spotify data
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          pip install requests
          python fetch_spotify.py public/spotify.json

      - name: Commit and push updated Spotify data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Spotify data
          file_pattern: public/spotify.json
          commit_user_name: GitHub Actions
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

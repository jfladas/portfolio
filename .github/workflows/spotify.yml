name: Update Spotify Data
concurrency:
  group: pages
  cancel-in-progress: false # Do NOT cancel deployments, just queue them
on:
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
    types: [update_spotify]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the script from your MAIN branch
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: source
          ref: main 

      # 2. Get the files from your GH-PAGES branch to update them
      - name: Checkout Deployment
        uses: actions/checkout@v4
        with:
          path: deployment
          ref: gh-pages
      - name: Run Fetch Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          pip install requests
          # We tell the script exactly where to put the file:
          python source/fetch_spotify.py deployment/spotify.json

      - name: Commit and Push
        run: |
          cd deployment
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add spotify.json
          git commit -m "Update Spotify status [skip ci]" || exit 0
          git push origin gh-pages

name: Update Spotify Data

# This ensures only one Spotify update runs at a time
concurrency:
  group: spotify-data-sync
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * *' # Backup run once a day
  repository_dispatch:
    types: [update_spotify] # The trigger from Cronitor
  workflow_dispatch: # The manual button in GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the script from your MAIN branch
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: source
          ref: main 

      # 2. Get the files from your GH-PAGES branch to update them
      - name: Checkout Deployment
        uses: actions/checkout@v4
        with:
          path: deployment
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Fetch Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          pip install requests
          # Direct the output to the deployment folder
          python source/fetch_spotify.py deployment/spotify.json

      - name: Commit and Push
        run: |
          cd deployment
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add spotify.json
          # [skip ci] is the magic string that stops the Page Build loop
          git commit -m "Update Spotify status [skip ci]" || exit 0
          git push origin gh-pages
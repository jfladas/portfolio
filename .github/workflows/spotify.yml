name: Build, Update Spotify and Deploy

on:
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
    types: [update_spotify]
  workflow_dispatch:
  push:
    branches: [main] # Also deploy automatically when you push code changes

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Vite Project
        run: npm run build # This creates the /dist folder

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Fetch Spotify Data
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          pip install requests
          # We save the JSON directly into the /dist folder before deploying
          python fetch_spotify.py dist/spotify.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Only deploy the built site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
